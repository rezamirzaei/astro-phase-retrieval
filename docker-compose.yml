# Phase Retrieval — Docker Compose
# Start with:  docker compose up --build

services:
  # ── PostgreSQL database ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: phase
      POSTGRES_PASSWORD: phase
      POSTGRES_DB: phase
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phase"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "4534:5432"

  # ── FastAPI backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    init: true  # proper PID 1 signal handling
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PR_DATABASE_URL: "postgresql://phase:phase@db:5432/phase"
      PR_SECRET_KEY: "change-me-in-production"
      PR_DATA_DIR: "/app/data"
      PR_OUTPUT_DIR: "/app/web_outputs"
      PR_CORS_ORIGINS: '["http://localhost:4532","http://localhost"]'
      PR_MAX_CONCURRENT_JOBS: "4"
      PR_SHUTDOWN_TIMEOUT_SECONDS: "30"
      PR_UPLOAD_MAX_BYTES: "104857600"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - app_data:/app/data
      - app_outputs:/app/web_outputs
    ports:
      - "4533:8000"

  # ── Angular frontend (nginx) ───────────────────────────────────────
  frontend:
    build:
      context: web/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4532:80"

volumes:
  pgdata:
  app_data:
  app_outputs:

